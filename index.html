<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Vincent Market</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      scroll-behavior: smooth;
    }
    body {
      background: linear-gradient(145deg, #e3f0fa 0%, #b8d4e8 100%);
      min-height: 100vh;
      padding: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .app {
      max-width: 480px;
      width: 100%;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 48px 48px 32px 32px;
      box-shadow: 0 25px 50px -10px rgba(0, 20, 40, 0.3);
      padding: 20px 18px 30px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      transition: all 0.2s ease;
    }
    /* loading & splash */
    .splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 500px;
      gap: 20px;
      text-align: center;
    }
    .loader {
      width: 70px;
      height: 70px;
      border: 6px solid rgba(0, 40, 80, 0.1);
      border-top: 6px solid #0a2a44;
      border-radius: 50%;
      animation: spin 1s cubic-bezier(0.6, 0, 0.4, 1) infinite;
      box-shadow: 0 0 0 4px rgba(10, 42, 68, 0.08);
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .splash h1 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #0a2a44;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #0a2a44, #1e5a7a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 2px 10px rgba(0,60,120,0.15);
      opacity: 0;
      animation: fadeInUp 0.8s ease forwards;
      animation-delay: 0.5s;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .splash .sub {
      color: #1e3b5a;
      font-weight: 500;
      background: rgba(255,255,255,0.5);
      padding: 6px 18px;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      opacity: 0;
      animation: fadeInUp 0.8s ease forwards;
      animation-delay: 0.8s;
    }
    .btn-start {
      background: #0a2a44;
      color: white;
      border: none;
      padding: 14px 44px;
      border-radius: 60px;
      font-size: 1.1rem;
      font-weight: 600;
      box-shadow: 0 12px 24px -8px rgba(10, 42, 68, 0.4);
      transition: 0.2s;
      cursor: pointer;
      letter-spacing: 0.5px;
      margin-top: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      opacity: 0;
      animation: fadeInUp 0.8s ease forwards;
      animation-delay: 1.2s;
    }
    .btn-start:active { transform: scale(0.95); background: #123b5e; }
    .hidden { display: none !important; }

    /* main content */
    .main-content {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .hero-card {
      background: white;
      border-radius: 32px;
      padding: 18px 16px 14px;
      box-shadow: 0 8px 24px rgba(0, 20, 40, 0.08);
      border: 1px solid rgba(255,255,255,0.7);
      backdrop-filter: blur(4px);
    }
    .hero-card img {
      width: 100%;
      border-radius: 24px;
      max-height: 200px;
      object-fit: cover;
      border: 1px solid #e9f0f5;
    }
    .hero-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: #0a2a44;
      margin: 10px 0 4px;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .hero-title span { background: #0a2a44; color: white; padding: 0 12px; border-radius: 40px; font-size: 0.8rem; }
    .hero-desc {
      background: #eef6fc;
      padding: 12px 14px;
      border-radius: 20px;
      margin: 6px 0 8px;
      font-size: 0.9rem;
      color: #0a2a44;
      border-left: 4px solid #0a2a44;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 8px;
    }
    .hero-desc i { font-style: normal; background: rgba(10,42,68,0.05); padding: 2px 8px; border-radius: 20px; }

    /* opsi menu */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 10px 0 12px;
    }
    .menu-btn {
      background: white;
      border: none;
      padding: 14px 0;
      border-radius: 30px;
      font-weight: 600;
      color: #0a2a44;
      box-shadow: 0 4px 8px rgba(0,0,0,0.02);
      transition: 0.15s;
      border: 1px solid rgba(10,42,68,0.08);
      font-size: 0.8rem;
      backdrop-filter: blur(4px);
      background: rgba(255,255,255,0.7);
    }
    .menu-btn:active { background: #0a2a44; color: white; transform: scale(0.94); }

    /* konten dinamis */
    .content-panel {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(8px);
      border-radius: 32px;
      padding: 16px 12px;
      border: 1px solid rgba(255,255,255,0.5);
      box-shadow: 0 8px 20px rgba(0, 20, 40, 0.06);
    }
    .carousel {
      display: flex;
      overflow-x: auto;
      gap: 18px;
      padding: 8px 4px 18px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .carousel::-webkit-scrollbar { height: 4px; }
    .carousel::-webkit-scrollbar-thumb { background: #0a2a44; border-radius: 20px; }
    .product-card {
      min-width: 220px;
      background: white;
      border-radius: 30px;
      padding: 14px 14px 18px;
      scroll-snap-align: start;
      box-shadow: 0 6px 16px rgba(0,0,0,0.02);
      border: 1px solid #eaf1f7;
      flex-shrink: 0;
    }
    .product-card img {
      width: 100%;
      height: 110px;
      object-fit: cover;
      border-radius: 20px;
      background: #d9e4ed;
    }
    .product-card h4 { font-size: 1rem; margin: 8px 0 2px; color: #0a2a44; }
    .product-card .price { font-weight: 700; color: #1b4a6b; }
    .btn-pilih {
      background: #a4161a;
      color: white;
      border: none;
      padding: 8px 0;
      width: 100%;
      border-radius: 60px;
      font-weight: 600;
      margin-top: 10px;
      box-shadow: 0 4px 8px rgba(164, 22, 26, 0.3);
      transition: 0.1s;
      font-size: 0.8rem;
    }
    .btn-pilih:active { background: #6d0e11; transform: scale(0.96); }

    /* modal qris */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 20px;
    }
    .modal-overlay.active {
      display: flex;
    }
    .modal-box {
      max-width: 380px;
      width: 100%;
      background: white;
      border-radius: 40px;
      padding: 24px 18px 28px;
      text-align: center;
      box-shadow: 0 40px 60px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .modal-box img { 
      width: 100%; 
      max-height: 240px; 
      object-fit: contain; 
      border-radius: 24px; 
      background: #f0f6fc;
    }
    .modal-btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 18px;
    }
    .modal-btn {
      background: #1a1a2e;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.95rem;
      box-shadow: 0 6px 12px rgba(0,0,0,0.2);
      transition: 0.1s;
    }

    .modal-btn.tutup { background: #3a3a4a; }
    .modal-btn.kirim { background: #a4161a; }

    .payment-list {
      background: #f2f8fe;
      padding: 12px 16px;
      border-radius: 24px;
      margin: 8px 0;
      font-size: 0.95rem;
    }
    .payment-list strong { color: #0a2a44; }
    .testi-item { background: white; padding: 8px 14px; border-radius: 40px; margin: 5px 0; border-left: 4px solid #0a2a44; }
    .faq-item { background: #eaf2f9; padding: 10px 16px; border-radius: 20px; margin: 6px 0; }
    .riwayat-item { background: white; padding: 8px 14px; border-radius: 20px; margin: 4px 0; font-size: 0.9rem; }
    .footer-note { margin-top: 16px; text-align: center; font-weight: 500; color: #0a2a44; background: rgba(255,255,255,0.5); padding: 8px; border-radius: 40px; backdrop-filter: blur(4px); }
    
    .package-list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f2f8fe;
      padding: 8px 12px;
      border-radius: 30px;
      margin: 6px 0;
    }
    .package-list-item button {
      background: #a4161a;
      color: white;
      border: none;
      border-radius: 30px;
      padding: 6px 16px;
      font-weight: 600;
      font-size: 0.8rem;
    }
    .package-list-item button:active { opacity: 0.7; transform: scale(0.95); }
  </style>
</head>
