<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>VincentMarket · Teknologi</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    body {
      background: linear-gradient(145deg, #b3d9ff 0%, #e6f0fa 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    #loading-screen {
      position: fixed;
      inset: 0;
      background: #0b1a2f;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    #loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .loader-ring {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 6px solid rgba(255,255,255,0.1);
      border-top: 6px solid #00b4ff;
      border-right: 6px solid #7b61ff;
      animation: spin 0.9s cubic-bezier(0.6,0,0.4,1) infinite;
      box-shadow: 0 0 20px #00b4ff66;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .welcome-text {
      margin-top: 28px;
      color: #fff;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #c0e0ff, #a0c4ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px #0080ff55;
      opacity: 0;
      animation: fadeGlow 1.2s ease forwards;
      animation-delay: 0.5s;
    }
    @keyframes fadeGlow {
      0% { opacity: 0; transform: scale(0.95); }
      100% { opacity: 1; transform: scale(1); }
    }
    .start-btn {
      margin-top: 35px;
      padding: 14px 48px;
      border: none;
      background: #1e2f4a;
      color: white;
      font-size: 1.3rem;
      font-weight: 600;
      border-radius: 60px;
      box-shadow: 0 6px 0 #0b1a2f, 0 10px 30px #00000055;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 1px;
      border: 1px solid #4a7a9c;
      opacity: 0;
      animation: fadeGlow 0.8s ease forwards;
      animation-delay: 2s;
    }
    .start-btn:hover {
      background: #2a4060;
      transform: translateY(-3px);
      box-shadow: 0 10px 0 #0b1a2f, 0 16px 40px #00000077;
    }
    #app {
      display: none;
      width: 100%;
      max-width: 780px;
      margin: 0 auto;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 48px 48px 32px 32px;
      padding: 20px 18px 30px;
      box-shadow: 0 30px 50px rgba(0,20,40,0.5), inset 0 0 0 1px rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.3);
    }
    .brand-header {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(6px);
      padding: 14px 18px;
      border-radius: 60px;
      margin-bottom: 24px;
      border: 1px solid #ffffffee;
    }
    .brand-header img {
      width: 48px;
      height: 48px;
      border-radius: 30px;
      object-fit: cover;
      border: 2px solid white;
      box-shadow: 0 4px 12px #00000022;
    }
    .brand-header h1 {
      font-size: 1.7rem;
      font-weight: 800;
      background: linear-gradient(135deg, #0a2647, #1f4b7a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    .brand-header i {
      margin-left: auto;
      color: #1f4b7a;
      font-size: 1.6rem;
      opacity: 0.7;
    }
    .reason-card {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(4px);
      border-radius: 28px;
      padding: 20px 18px;
      margin-bottom: 28px;
      border: 1px solid #ffffffcc;
      box-shadow: 0 8px 18px #00112222;
    }
    .reason-card p {
      font-weight: 600;
      color: #0b2b44;
      font-size: 1.1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 8px 18px;
      justify-content: center;
    }
    .reason-card p i {
      color: #0077ff;
      margin-right: 5px;
    }
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin: 24px 0 18px;
    }
    .menu-btn {
      background: rgba(10,30,50,0.75);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.25);
      padding: 14px 0;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      font-size: 0.9rem;
      letter-spacing: 0.5px;
      transition: all 0.2s;
      cursor: pointer;
      box-shadow: 0 4px 10px #00000033;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .menu-btn i { font-size: 1.1rem; }
    .menu-btn.active {
      background: #004a99;
      box-shadow: 0 0 20px #0080ffaa;
      border-color: #88ccff;
      transform: scale(1.01);
    }
    .menu-btn:hover { background: #1f4b7a; transform: translateY(-2px); }
    .product-slide {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(8px);
      border-radius: 40px;
      padding: 20px 16px 25px;
      margin: 16px 0 10px;
      border: 1px solid #ffffffcc;
      box-shadow: 0 8px 20px #00000022;
      display: none;
    }
    .product-slide.show { display: block; }
    .product-image {
      width: 100%;
      height: 200px;
      object-fit: contain;
      border-radius: 28px;
      border: 2px solid white;
      box-shadow: 0 8px 18px #00000033;
      margin-bottom: 16px;
      background: #d9eaff;
    }
    .product-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #0a2647;
      margin-bottom: 6px;
    }
    .product-price {
      font-weight: 600;
      color: #00337a;
      background: #d3e6ff;
      display: inline-block;
      padding: 4px 18px;
      border-radius: 30px;
      font-size: 0.95rem;
      margin-bottom: 12px;
    }
    .paket-btn {
      background: #8b1e1e;
      border: none;
      color: white;
      font-weight: 700;
      padding: 12px 20px;
      border-radius: 60px;
      font-size: 1rem;
      box-shadow: 0 4px 0 #3d0a0a;
      transition: 0.15s;
      cursor: pointer;
      margin: 6px 6px 6px 0;
      border: 1px solid #cc6666;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .paket-btn:hover { background: #aa2222; transform: scale(0.97); }
    .modal-qris {
      display: none;
      position: fixed;
      inset: 0;
      background: #0f1e2eb3;
      backdrop-filter: blur(8px);
      justify-content: center;
      align-items: center;
      z-index: 999;
      padding: 20px;
    }
    .modal-qris.open { display: flex; }
    .modal-card {
      background: #f0f7ff;
      max-width: 380px;
      width: 100%;
      border-radius: 48px;
      padding: 28px 22px 30px;
      box-shadow: 0 40px 70px #00000077;
      border: 1px solid #ffffffcc;
      text-align: center;
    }
    .modal-card img {
      width: 100%;
      max-height: 300px;
      object-fit: contain;
      border-radius: 20px;
      background: white;
      padding: 8px;
      border: 2px solid #acc8e5;
    }
    .modal-btn-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin: 18px 0 8px;
    }
    .modal-btn {
      background: #1f2f44;
      border: none;
      color: white;
      padding: 12px 24px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.9rem;
      box-shadow: 0 4px 0 #0a141f;
      transition: 0.15s;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #5a7a9a;
    }
    .modal-btn i { font-size: 1rem; }
    .modal-btn:hover { background: #2e405e; transform: scale(0.96); }
    .close-modal-btn {
      background: #6b1f1f;
      border: none;
      color: white;
      padding: 10px 32px;
      border-radius: 60px;
      font-weight: 700;
      margin-top: 12px;
      box-shadow: 0 4px 0 #3d0f0f;
      cursor: pointer;
    }
    .close-modal-btn:hover { background: #8f2a2a; }
    .slide-nav {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 16px 0 6px;
    }
    .slide-nav button {
      background: #1f3d5a;
      border: none;
      color: white;
      width: 48px;
      height: 48px;
      border-radius: 40px;
      font-size: 1.4rem;
      box-shadow: 0 4px 0 #0b1f30;
      cursor: pointer;
      transition: 0.1s;
      border: 1px solid #5f8bb0;
    }
    .slide-nav button:hover { background: #2f5780; transform: scale(0.94); }
    .slide-indicator {
      text-align: center;
      font-weight: 600;
      color: #1f4670;
      margin-top: 6px;
    }
    .social-footer {
      margin-top: 28px;
      display: flex;
      justify-content: center;
      gap: 24px;
      color: #1a3b5c;
      font-size: 1.8rem;
    }
    .social-footer a { color: #1a3b5c; transition: 0.2s; }
    .social-footer a:hover { color: #0077ff; transform: scale(1.2); }
    @media (max-width: 500px) {
      .menu-grid { grid-template-columns: repeat(2, 1fr); }
      .brand-header h1 { font-size: 1.3rem; }
      .reason-card p { font-size: 0.9rem; }
    }
    .hidden { display: none; }
    .text-muted { opacity: 0.7; }
    #menuContent {
      margin-top: 10px;
      background: rgba(255,255,255,0.4);
      border-radius: 32px;
      padding: 20px;
      text-align: center;
      color: #0b2b44;
      font-weight: 500;
      backdrop-filter: blur(4px);
      border: 1px solid #ffffffaa;
    }
  </style>
</head>
<body>
  <!-- LOADING -->
  <div id="loading-screen">
    <div class="loader-ring"></div>
    <div class="welcome-text">Halo Selamat Datang Di VincentMarket</div>
    <button class="start-btn" id="startBtn"><i class="fas fa-rocket" style="margin-right:10px;"></i> Mulai</button>
  </div>

  <!-- APP -->
  <div id="app">
    <div class="brand-header">
      <img src="https://i.postimg.cc/5j8k2kft/logo.png" alt="VincentMarket" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2248%22 height=%2248%22 viewBox=%220 0 48 48%22%3E%3Crect width=%2248%22 height=%2248%22 fill=%22%230b2f55%22/%3E%3Ctext x=%228%22 y=%2234%22 fill=%22%23fff%22 font-size=%2220%22 font-weight=%22bold%22%3EVM%3C/text%3E%3C/svg%3E'">
      <h1>Vincent Market</h1>
      <i class="fas fa-microchip"></i>

    <div class="reason-card">
      <p><i class="fas fa-bolt"></i> Proses otomatis 1 detik <i class="fas fa-shield-alt"></i> Server bot aman & stabil <i class="fas fa-tag"></i> Harga murah & terjangkau <i class="fas fa-headset"></i> Support fast respon 24 jam</p>
    </div>

    <div class="menu-grid">
      <button class="menu-btn active" data-category="all"><i class="fas fa-store"></i> MarketPlace</button>
      <button class="menu-btn" data-category="payment"><i class="fas fa-credit-card"></i> Payment</button>
      <button class="menu-btn" data-category="social"><i class="fas fa-share-alt"></i> Social Media</button>
      <button class="menu-btn" data-category="testimoni"><i class="fas fa-star"></i> Testimoni</button>
      <button class="menu-btn" data-category="riwayat"><i class="fas fa-history"></i> Riwayat</button>
      <button class="menu-btn" data-category="faq"><i class="fas fa-question-circle"></i> FAQ</button>
    </div>

    <!-- SLIDE PRODUK -->
    <div id="slideContainer" class="product-slide show">
      <img id="productImg" class="product-image" src="https://i.postimg.cc/B8hB6rdQ/bot.jpg" alt="produk">
      <div id="productTitle" class="product-title">Sewa Bot Jaga Group</div>
      <div id="productPrice" class="product-price">Biasa · 7 Hari Rp 1.000</div>
      <button class="paket-btn" id="pilihPaketBtn"><i class="fas fa-cart-plus"></i> Pilih Paket</button>
      <div class="slide-nav">
        <button id="prevSlide"><i class="fas fa-chevron-left"></i></button>
        <button id="nextSlide"><i class="fas fa-chevron-right"></i></button>
      </div>
      <div class="slide-indicator" id="slideIndicator">1 / 34</div>
    </div>

    <div id="menuContent" style="display:none;">
      <i class="fas fa-cog fa-spin" style="margin-right:8px;"></i> Konten untuk menu ini segera hadir.
    </div>

    <div class="social-footer">
      <a href="#"><i class="fab fa-whatsapp"></i></a>
      <a href="#"><i class="fab fa-instagram"></i></a>
      <a href="#"><i class="fab fa-tiktok"></i></a>
    </div>
  </div>

  <!-- MODAL QRIS -->
  <div id="qrisModal" class="modal-qris">
    <div class="modal-card">
      <img src="https://www.upload.ee/image/19447703/file.jpg" alt="QRIS" id="qrisImage">
      <div class="modal-btn-group">
        <button class="modal-btn" id="downloadQris"><i class="fas fa-download"></i> Download Qris</button>
        <button class="modal-btn" id="kirimBuktiBtn"><i class="fas fa-receipt"></i> Kirim Bukti Transfer</button>
      </div>
      <button class="close-modal-btn" id="closeModalBtn"><i class="fas fa-times"></i> Tutup</button>
    </div>
  </div>

  <script>
    (function() {
      // LOADING
      const loading = document.getElementById('loading-screen');
      const startBtn = document.getElementById('startBtn');
      const app = document.getElementById('app');

      startBtn.addEventListener('click', function() {
        loading.classList.add('hidden');
        app.style.display = 'block';
        const spotify = document.createElement('iframe');
        spotify.style.display = 'none';
        spotify.src = 'https://open.spotify.com/embed/track/3ZwqWrRpylU9nfy99qwKdR?utm_source=generator&autoplay=1';
        document.body.appendChild(spotify);
      });

      // DATA PRODUK (LENGKAP)
      const products = [
        // SEWA BOT JAGA GROUP (5)
        { name: 'Sewa Bot Jaga Group', price: 'Biasa · 7 Hari Rp 1.000', img: 'https://i.postimg.cc/B8hB6rdQ/bot.jpg', category: 'bot' },
        { name: 'Sewa Bot Jaga Group', price: 'Biasa · 1 Bulan Rp 4.000', img: 'https://i.postimg.cc/B8hB6rdQ/bot.jpg', category: 'bot' },
        { name: 'Sewa Bot Jaga Group', price: 'Biasa · 4 Bulan Rp 15.000', img: 'https://i.postimg.cc/B8hB6rdQ/bot.jpg', category: 'bot' },
        { name: 'Sewa Bot Jaga Group', price: 'Biasa · 6 Bulan Rp 22.000', img: 'https://i.postimg.cc/B8hB6rdQ/bot.jpg', category: 'bot' },
        { name: 'Sewa Bot Jaga Group', price: 'Biasa · 1 Tahun Rp 45.000', img: 'https://i.postimg.cc/B8hB6rdQ/bot.jpg', category: 'bot' },
        // PREMIUM (5)
        { name: 'Premium', price: 'Premium · 7 Hari Rp 3.000', img: 'https://i.postimg.cc/B8hB6rdQ/bot.jpg', category: 'premium' },
        { name: 'Premium', price: 'Premium · 1 Bulan Rp 6.000', img: 'https://i.postimg.cc/B8hB6rdQ/bot.jpg', category: 'premium' },
        { name: 'Premium', price: 'Premium · 4 Bulan Rp 22.000', img: 'https://i.postimg.cc/B8hB6rdQ/bot.jpg', category: 'premium' },
        { name: 'Premium', price: 'Premium · 6 Bulan Rp 35.000', img: 'https://i.postimg.cc/B8hB6rdQ/bot.jpg', category: 'premium' },
        { name: 'Premium', price: 'Premium · 1 Tahun Rp 75.000', img: 'https://i.postimg.cc/B8hB6rdQ/bot.jpg', category: 'premium' },
        // PANEL PTERODACTYLE (11)
        { name: 'Panel Pterodactyle', price: 'Panel Ram 1 GB Rp 1.500', img: 'https://i.postimg.cc/B8hB6rdQ/bot.jpg', category: 'panel' },
        { name: 'Panel Pterodactyle', price: 'Panel Ram 2 GB Rp 2.500', img: 'https://i.postimg.cc/B8hB6rdQ/bot.jpg', category: 'panel' },
        { name: 'Panel Pterodactyle', price: 'Panel Ram 3 GB Rp 3.500', img: 'https://i.postimg.cc/B8hB6rdQ/bot.jpg', category: 'panel' },
        { name: 'Panel Pterodactyle', price: 'Panel Ram 4 GB Rp 4.500', img: 'https://i.postimg.cc/B8hB6rdQ/bot.jpg', category: 'panel' },
        { name: 'Panel Pterodactyle', price: 'Panel Ram 5 GB Rp 5.500', img: 'https://i.postimg.cc/B8hB6rdQ/bot.jpg', category: 'panel' },
        { name: 'Panel Pterodactyle', price: 'Panel Ram 6 GB Rp 6.500', img: 'https://i.postimg.cc/B8hB6rdQ/bot.jpg', category: 'panel' },
        { name: 'Panel Pterodactyle', price: 'Panel Ram 7 GB Rp 7.500', img: 'https://i.postimg.cc/B8hB6rdQ/bot.jpg', category: 'panel' },
        { name: 'Panel Pterodactyle', price: 'Panel Ram 8 GB Rp 8.000', img: 'https://i.postimg.cc/B8hB6rdQ/bot.jpg', category: 'panel' },
        { name: 'Panel Pterodactyle', price: 'Panel Ram 9 GB Rp 8.500', img: 'https://i.postimg.cc/B8hB6rdQ/bot.jpg', category: 'panel' },
        { name: 'Panel Pterodactyle', price: 'Panel Ram 10 GB Rp 9.000', img: 'https://i.postimg.cc/B8hB6rdQ/bot.jpg', category: 'panel' },
        { name: 'Panel Pterodactyle', price: 'Panel Ram Unlimited Rp 11.000', img: 'https://i.postimg.cc/B8hB6rdQ/bot.jpg', category: 'panel' },
        // SCRIPT WEBSITE (4)
        { name: 'Script Website Jualan V1', price: 'Rp 3.000', img: 'https://i.postimg.cc/sQmBsBk7/v1.jpg', category: 'scriptweb' },
        { name: 'Script Website Jualan V2', price: 'Rp 7.000', img: 'https://i.postimg.cc/sG2MXjzT/v2.jpg', category: 'scriptweb' },
        { name: 'Script Website Jualan V3', price: 'Rp 7.000', img: 'https://i.postimg.cc/XZ3dW0r2/v3.jpg', category: 'scriptweb' },
        { name: 'Script Website Jualan V4', price: 'Rp 11.000', img: 'https://i.postimg.cc/vD8gXznD/v4.jpg', category: 'scriptweb' },
        // SCRIPT BOT (7)
        { name: 'Script Bot Wa - Pushkontak 1.0', price: 'Rp 7.000', img: 'https://i.postimg.cc/dLL7cV40/push.jpg', category: 'scriptbot' },
        { name: 'Script Bot Wa - Jaga Grup 1.0', price: 'Rp 7.000', img: 'https://i.postimg.cc/Bth8zK52/jaga.jpg', category: 'scriptbot' },
        { name: 'Script Bot Wa Multi Device 1.1', price: 'Rp 20.000', img: 'https://i.postimg.cc/1gZ4FcPD/md1.jpg', category: 'scriptbot' },
        { name: 'Script Bot Wa Multi Device 2.0', price: 'Rp 17.000', img: 'https://i.postimg.cc/4KTncbZG/md2.jpg', category: 'scriptbot' },
        { name: 'Script Bot Wa Store 1.0', price: 'Rp 17.000', img: 'https://i.postimg.cc/9RLfs69C/store.jpg', category: 'scriptbot' },
        { name: 'Script Bot Wa Cpanel 1.0', price: 'Rp 12.000', img: 'https://i.postimg.cc/Hc6LFqM7/cpanel.jpg', category: 'scriptbot' },
        { name: 'Script Bot Wa Jpm 1.0', price: 'Rp 12.000', img: 'https://i.postimg.cc/D8qykY7T/jpm.jpg', category: 'scriptbot' },
        // APK PREMIUM (2)
        { name: 'Netflix Premium', price: 'Rp 22.000', img: 'https://i.postimg.cc/YLRnQH12/netflix.jpg', category: 'apk' },
        { name: 'Canva Premium', price: 'Rp 22.000', img: 'https://i.postimg.cc/8JhnPWcb/canva.jpg', category: 'apk' }
      ];

      let currentIndex = 0;
      const slideContainer = document.getElementById('slideContainer');
      const productImg = document.getElementById('productImg');
      const productTitle = document.getElementById('productTitle');
      const productPrice = document.getElementById('productPrice');
      const indicator = document.getElementById('slideIndicator');

      function updateSlide(index) {
        const p = products[index];
        if (!p) return;
        productImg.src = p.img;
        productImg.onerror = function() { this.src = 'https://i.postimg.cc/B8hB6rdQ/bot.jpg'; };
        productTitle.textContent = p.name;
        productPrice.textContent = p.price;
        indicator.textContent = `${index+1} / ${products.length}`;
        currentIndex = index;
      }

      document.getElementById('prevSlide').addEventListener('click', function() {
        currentIndex = (currentIndex - 1 + products.length) % products.length;
        updateSlide(currentIndex);
      });
      document.getElementById('nextSlide').addEventListener('click', function() {
        currentIndex = (currentIndex + 1) % products.length;
        updateSlide(currentIndex);
      });

      updateSlide(0);

      // MODAL QRIS
      const modal = document.getElementById('qrisModal');
      const pilihPaketBtn = document.getElementById('pilihPaketBtn');
      const closeModalBtn = document.getElementById('closeModalBtn');
      const downloadQrisBtn = document.getElementById('downloadQris');
      const kirimBuktiBtn = document.getElementById('kirimBuktiBtn');

      pilihPaketBtn.addEventListener('click', function() {
        modal.classList.add('open');
      });
      closeModalBtn.addEventListener('click', function() { modal.classList.remove('open'); });
      window.addEventListener('click', function(e) { if (e.target === modal) modal.classList.remove('open'); });

      downloadQrisBtn.addEventListener('click', function() {
        const link = document.createElement('a');
        link.href = 'https://www.upload.ee/image/19447703/file.jpg';
        link.download = 'qris_vincent.jpg';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      });

      kirimBuktiBtn.addEventListener('click', function() {
        const p = products[currentIndex];
        let msg = `Halo Admin, saya sudah bayar. Paket: ${p.name} Total: ${p.price} Saya lampirkan bukti transfer`;
        window.open(`https://wa.me/6282136040582?text=${encodeURIComponent(msg)}`, '_blank');
        modal.classList.remove('open');
      });

      // MENU NAVIGASI
      const menuBtns = document.querySelectorAll('.menu-btn');
      const menuContent = document.getElementById('menuContent');

      menuBtns.forEach(btn => {
        btn.addEventListener('click', function() {
          menuBtns.forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          const cat = this.dataset.category;
          if (cat === 'all') {
            slideContainer.style.display = 'block';
            menuContent.style.display = 'none';
            // tampilkan semua produk (index 0)
            currentIndex = 0;
            updateSlide(0);
          } else {
            slideContainer.style.display = 'none';
            menuContent.style.display = 'block';
            const titles = {
              payment: '💳 Payment — Metode pembayaran tersedia.',
              social: '📱 Social Media — Instagram, TikTok, WhatsApp.',
              testimoni: '⭐ Testimoni — Pelanggan puas dengan layanan kami.',
              riwayat: '📜 Riwayat Pembelian — Belum ada transaksi.',
              faq: '❓ FAQ — Pertanyaan umum seputar produk.'
            };
            menuContent.innerHTML = `<i class="fas fa-arrow-right"></i> ${titles[cat] || 'Konten segera hadir.'}`;
          }
        });
      });

      // Aktifkan menu pertama
      document.querySelector('[data-category="all"]').click();
    })();
  </script>
</body>
</html>
