<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
  <title>VincentMarket · Marketplace</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    body {
      background: linear-gradient(145deg, #e0f2fe 0%, #f0f9ff 100%);
      min-height: 100vh;
      color: #0b1e2b;
      padding: 0 0 30px 0;
    }
    #loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #0b1e2b;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.6s ease;
    }
    #loading-overlay.hide {
      opacity: 0;
      pointer-events: none;
    }
    .loader-spinner {
      width: 65px;
      height: 65px;
      border: 6px solid #2a4b66;
      border-top: 6px solid #60a5fa;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .welcome-text {
      margin-top: 35px;
      color: #f0f9ff;
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-shadow: 0 0 15px #3b82f680;
      text-align: center;
      padding: 0 20px;
    }
    .start-btn {
      margin-top: 40px;
      padding: 14px 48px;
      background: #1e3a5f;
      border: none;
      border-radius: 60px;
      color: white;
      font-size: 1.4rem;
      font-weight: 600;
      box-shadow: 0 8px 0 #0b1e2b;
      cursor: pointer;
      transition: 0.1s linear;
      letter-spacing: 1px;
    }
    .start-btn:active {
      transform: translateY(6px);
      box-shadow: 0 2px 0 #0b1e2b;
    }
    .start-btn.hidden {
      display: none;
    }
    .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 20px 16px 30px;
    }
    .hero-banner {
      width: 100%;
      border-radius: 32px;
      overflow: hidden;
      margin-bottom: 25px;
      box-shadow: 0 15px 30px rgba(0,20,40,0.15);
      border: 2px solid rgba(255,255,255,0.6);
      position: relative;
    }
    .hero-banner img {
      width: 100%;
      height: auto;
      max-height: 280px;
      object-fit: cover;
      display: block;
    }
    .hero-banner .overlay-text {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      padding: 8px 24px;
      border-radius: 40px;
      color: white;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .brand-header {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(8px);
      padding: 14px 25px;
      border-radius: 60px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: 0 10px 25px rgba(0,20,40,0.08);
      flex-wrap: wrap;
    }
    .brand-header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      background: linear-gradient(135deg, #0a2a44, #2563eb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    .brand-header span {
      margin-left: auto;
      font-size: 0.9rem;
      background: #1e293b;
      color: #e2e8f0;
      padding: 8px 18px;
      border-radius: 30px;
    }
    .menu-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 8px;
      margin: 25px 0 30px;
      justify-content: center;
    }
    .menu-btn {
      background: #ffffffcc;
      backdrop-filter: blur(6px);
      border: 1px solid #b9d5f0;
      padding: 12px 24px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 1rem;
      color: #0b2a44;
      box-shadow: 0 4px 10px rgba(0,0,0,0.02);
      transition: 0.2s;
      cursor: pointer;
      flex: 0 1 auto;
      background: white;
      border: 1px solid #cbd5e1;
    }
    .menu-btn i { margin-right: 8px; color: #2563eb; }
    .menu-btn:hover {
      background: #1e3a5f;
      color: white;
      border-color: #1e3a5f;
      transform: scale(0.98);
    }
    .menu-btn.active {
      background: #1e3a5f;
      color: white;
      border-color: #1e3a5f;
    }
    .panel-content {
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(8px);
      border-radius: 40px;
      padding: 25px 20px;
      border: 1px solid rgba(255,255,255,0.8);
      box-shadow: 0 20px 35px -10px rgba(0,30,60,0.15);
      min-height: 380px;
    }
    .panel-content h2 {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 20px;
      color: #0b2a44;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .product-grid {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }
    .product-category {
      background: white;
      border-radius: 28px;
      padding: 20px 18px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.02);
      border: 1px solid #e6f0fa;
    }
    .category-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: #0b2a44;
      margin-bottom: 15px;
      border-left: 6px solid #2563eb;
      padding-left: 15px;
    }
    .product-slider {
      display: flex;
      overflow-x: auto;
      gap: 25px;
      padding: 10px 5px 20px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }
    .product-slider::-webkit-scrollbar { height: 6px; }
    .product-slider::-webkit-scrollbar-thumb { background: #2563eb; border-radius: 12px; }
    .product-card {
      min-width: 220px;
      max-width: 250px;
      background: #f8fcff;
      border-radius: 28px;
      padding: 16px 14px 18px;
      box-shadow: 0 8px 18px rgba(0, 40, 70, 0.05);
      border: 1px solid #dfecf5;
      flex-shrink: 0;
      transition: 0.2s;
    }
    .product-card .img-placeholder {
      width: 100%;
      height: 140px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.2rem;
      color: white;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
      background: #2563eb;
    }
    .product-card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 18px;
      background: #dbeafe;
      border: 1px solid #b9d5f0;
    }
    .product-card .name {
      font-weight: 700;
      font-size: 1rem;
      margin: 12px 0 4px;
    }
    .product-card .price {
      color: #1e3a5f;
      font-weight: 600;
      font-size: 0.95rem;
    }
    .pilih-btn {
      background: #b91c1c;
      border: none;
      color: white;
      font-weight: 700;
      padding: 8px 0;
      border-radius: 30px;
      width: 100%;
      margin-top: 10px;
      transition: 0.15s;
      cursor: pointer;
      box-shadow: 0 4px 0 #7f1d1d;
      font-size: 0.9rem;
    }
    .pilih-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #7f1d1d;
    }
    .modal-qris {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 20px;
      visibility: hidden;
      opacity: 0;
      transition: 0.25s;
    }
    .modal-qris.open {
      visibility: visible;
      opacity: 1;
    }
    .modal-box {
      background: white;
      max-width: 420px;
      width: 100%;
      border-radius: 45px;
      padding: 30px 22px 25px;
      box-shadow: 0 40px 60px rgba(0,0,0,0.4);
      text-align: center;
    }
    .modal-box img {
      width: 100%;
      max-height: 280px;
      object-fit: contain;
      border-radius: 20px;
      background: #f0f9ff;
      padding: 8px;
    }
    .modal-box .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
      justify-content: center;
    }
    .modal-box .btn-group button {
      background: #1e293b;
      border: none;
      color: white;
      padding: 12px 18px;
      border-radius: 60px;
      font-weight: 600;
      flex: 1 0 auto;
      font-size: 0.95rem;
      box-shadow: 0 5px 0 #0f172a;
      transition: 0.1s;
      cursor: pointer;
    }
    .modal-box .btn-group button:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #0f172a;
    }
    .modal-box .btn-group .tutup-btn {
      background: #991b1b;
      box-shadow: 0 5px 0 #5a1212;
    }
    .modal-box .btn-group .download-btn {
      background: #0b2a44;
    }
    .footer-note {
      margin-top: 20px;
      background: #dbeafe80;
      padding: 15px;
      border-radius: 40px;
      font-weight: 500;
      text-align: center;
      color: #0b2a44;
    }
    .social-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 18px;
      background: #e9f2fa;
      padding: 16px 20px;
      border-radius: 40px;
      margin: 10px 0;
    }
    .testimoni-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px,1fr));
      gap: 15px;
    }
    .testi-item {
      background: white;
      border-radius: 30px;
      padding: 15px;
      border: 1px solid #cbd5e1;
    }
    .riwayat-item {
      background: #f1f7fe;
      padding: 8px 20px;
      border-radius: 40px;
      margin: 5px 0;
    }
    .faq-item {
      background: white;
      border-radius: 25px;
      padding: 16px 20px;
      margin: 12px 0;
      border-left: 8px solid #2563eb;
    }
    @media (max-width: 600px) {
      .brand-header h1 { font-size: 1.3rem; }
      .hero-banner .overlay-text { font-size: 1.2rem; padding: 4px 16px; }
    }
  </style>
</head>
<body>

<!-- loading -->
<div id="loading-overlay">
  <div class="loader-spinner"></div>
  <div class="welcome-text" id="welcomeText">Halo Selamat Datang Di VincentMarket</div>
  <button class="start-btn" id="startBtn">🚀 Mulai</button>
</div>

<div class="container" id="mainApp" style="display:none;">

  <!-- header -->

    <span><i class="fas fa-shield-alt"></i> aman & garansi</span>
  </div>

  <!-- kenapa pilih -->
  <div style="background:white; border-radius:40px; padding:16px 20px; margin-bottom:18px; border:1px solid #d4e2f0;">
    <div style="display:flex; flex-wrap:wrap; gap:12px 24px; justify-content:center; font-weight:500; color:#0b2a44;">

      <span><i class="fas fa-headset" style="color:#2563eb;"></i> Support fast respon 24 jam</span>
    </div>
  </div>

  <!-- menu opsi -->
  <div class="menu-grid" id="menuGrid">
    <button class="menu-btn" data-menu="marketplace"><i class="fas fa-store"></i> MarketPlace</button>
    <button class="menu-btn" data-menu="payment"><i class="fas fa-credit-card"></i> Payment</button>
    <button class="menu-btn" data-menu="social"><i class="fas fa-share-alt"></i> Social Media</button>
    <button class="menu-btn" data-menu="testimoni"><i class="fas fa-comment"></i> Testimoni</button>
    <button class="menu-btn" data-menu="riwayat"><i class="fas fa-history"></i> Riwayat</button>
    <button class="menu-btn" data-menu="faq"><i class="fas fa-question-circle"></i> FAQ</button>
  </div>

  <!-- panel konten -->
  <div class="panel-content" id="panelContent">
    <!-- marketplace default -->
  </div>

  <div class="footer-note" style="margin-top:25px;">
    <i class="fas fa-check-circle" style="color:#2563eb;"></i> Pembelian Produk Di Vincent Market Di Jamin Aman Dan Mendapatkan Garansi
  </div>
</div>

<!-- modal qris -->
<div class="modal-qris" id="modalQris">
  <div class="modal-box">
    <img src="https://www.upload.ee/image/19447703/file.jpg" alt="QRIS" id="qrisImage" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22%3E%3Crect fill=%22%232563eb%22 width=%22200%22 height=%22200%22/%3E%3Ctext x=%2230%22 y=%22120%22 fill=%22white%22 font-size=%2230%22%3EQRIS%3C/text%3E%3C/svg%3E'">

      <button id="kirimBuktiBtn"><i class="fas fa-receipt"></i> 🧾Kirim Bukti Transfer</button>
      <button class="tutup-btn" id="closeModalBtn">Tutup</button>
    </div>
  </div>
</div>
